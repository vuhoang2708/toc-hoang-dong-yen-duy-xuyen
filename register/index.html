<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Lễ tế xuân hằng năm - Tộc Hoàng Đông Yên</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0f172a;
            --mid: #334155;
            --light: #f8fafc;
            --accent: #f59e0b; /* Warm Yellow for Clan Event */
            --warm-yellow: #f59e0b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        body {
            background: url('../assets/bg_dongyen_final.jpg') center/cover no-repeat;
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end; /* Move to the right */
            padding: 30px;
        }

        .form-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 500px; /* Increased slightly to prevent word wrapping issues */
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9);
        }

        .header {
            text-align: center;
            margin-bottom: 1rem; /* Tighten */
        }

        h1 {
            font-size: 1.2rem; /* Smaller title */
            font-weight: 800;
            margin-bottom: 0.1rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem; /* Reduced */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 0.9rem; /* Smaller */
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1.25rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 2rem;
            box-shadow: 0 10px 30px -10px rgba(16, 185, 129, 0.5);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px -10px rgba(16, 185, 129, 0.6);
            filter: brightness(1.1);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #successMessage {
            display: none;
            text-align: center;
            padding: 2rem;
        }



        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .input-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="form-card" id="formWrapper">
        <div class="header">
            <h1>TỘC HOÀNG ĐÔNG YÊN</h1>
            <p class="subtitle" style="font-size: 1rem; color: #fff;">THÔNG BÁO: Lễ tế xuân hằng năm</p>
            <p class="subtitle" style="margin-top: 5px; font-size: 0.85rem;">Tổ chức lúc 8:00, Chủ Nhật, 26/04/2026 (10/3 âm lịch)<br>Địa điểm: Nhà thờ Tộc Hoàng Đông Yên, Xã Duy Xuyên, Đà Nẵng</p>
        </div>

        <form id="crmForm">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>Họ và tên *</label>
                    <input type="text" name="fullName" required placeholder="Nhập họ tên...">
                </div>
                <div class="input-group">
                    <label>Số điện thoại *</label>
                    <input type="tel" name="phone" required placeholder="Nhập số điện thoại...">
                </div>
                <div class="input-group">
                    <label>Email liên hệ (Tùy chọn)</label>
                    <input type="email" name="email" placeholder="Nhập địa chỉ email...">
                </div>
                <div class="input-group">
                    <label>Số người tham dự *</label>
                    <input type="number" name="numAttendees" required min="1" value="1" placeholder="Số lượng...">
                </div>
                <div class="input-group full-width">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                        <input type="checkbox" name="shuttle_bus" value="Yes" style="width: auto;">
                        <span>Đi chung xe 16 chỗ từ Đà Nẵng</span>
                    </label>
                </div>
                <input type="hidden" name="event_id" value="LE_TE_XUAN_2026">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn" style="margin-top: 1rem;">
                <span class="loading-spinner"></span>
                <span class="btn-text">Gửi đăng ký tham dự</span>
            </button>


        </form>

        <div id="successMessage">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h2 style="margin-bottom: 1rem; color: var(--accent);">Gửi thông tin thành công!</h2>
            <p style="color: rgba(255,255,255,0.7); line-height: 1.6;">Hội đồng gia tộc đã nhận được thông báo tham dự của bạn. Hẹn gặp lại vào ngày 26/04/2026.</p>

        </div>
    </div>

    <script>
        // Cấu hình linh hoạt cho Webhook URL
        // Nếu user muốn lưu vào Sheet khác, thay URL bên dưới:
        window.CUSTOM_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxj9s7wsUacz5k_75s1u-xPYmaokB_XSE_V1UjL6NuGLjDCOeFfbcXrsBpcLRoO3PzIVQ/exec";
    </script>
    <script src="../tracking.js?v=2.4"></script>
    <script>
        document.getElementById('crmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const spinner = btn.querySelector('.loading-spinner');
            const text = btn.querySelector('.btn-text');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            text.innerText = 'Đang xử lý...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                if (window.logToSheet) {
                    await window.logToSheet('CLAN_EVENT_REGISTER', data.fullName, {
                        ...data,
                        type: 'CLAN_MEMBER_CONFIRM',
                        source: 'DongYen_Portal'
                    });
                }
                
                document.getElementById('crmForm').style.display = 'none';
                document.querySelector('.header').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
            } catch (err) {
                console.error(err);
                alert('Có lỗi xảy ra, vui lòng thử lại sau.');
                btn.disabled = false;
                spinner.style.display = 'none';
                text.innerText = 'Gửi đăng ký tham dự';
            }
        });
    </script>
</body>
</html>
